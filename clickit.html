<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPU Overclock: Persistent Edition</title>
    <style>
        body {
            background-color: #050505;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .game-layout {
            display: flex;
            gap: 20px;
            max-width: 900px;
            width: 90%;
        }

        .main-game, .shop {
            background: #0f0f0f;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #00ffcc;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
        }

        .main-game { flex: 2; text-align: center; }
        .shop { flex: 1; min-width: 260px; }

        h1 { font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; margin: 0;}
        #score-display { font-size: 3.5rem; font-weight: bold; margin: 10px 0; color: #fff; text-shadow: 0 0 10px #00ffcc; }
        
        #click-button {
            background: none;
            border: none;
            width: 200px;
            height: 200px;
            cursor: pointer;
            transition: transform 0.05s;
            padding: 0;
            outline: none;
        }

        #click-button img {
            width: 100%;
            filter: drop-shadow(0 0 10px #00ffcc);
        }

        #click-button:active { transform: scale(0.92); }

        .shop-item {
            background: #151515;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #333;
            cursor: pointer;
            transition: 0.2s;
        }

        .shop-item:hover { border-color: #00ffcc; background: #1a1a1a; }
        .shop-item.disabled { opacity: 0.3; cursor: not-allowed; }

        .item-name { display: block; font-weight: bold; color: #00ffcc; font-size: 0.9rem; }
        .item-cost { font-size: 0.8rem; color: #ffcc00; }

        #save-status { font-size: 0.7rem; color: #444; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="game-layout">
        <div class="main-game">
            <h1>SYSTEM OVERCLOCK</h1>
            <div id="score-display">0</div>
            
            <button id="click-button">
                <img src="https://cdn-icons-png.flaticon.com/512/908/908424.png" alt="CPU Chip">
            </button>
            
            <div id="cps-display" style="color: #666; margin-top: 10px;">Data Rate: 0 bits/s</div>
            <div id="save-status">System Synced</div>
            <button onclick="resetGame()" style="background:none; border:none; color:#333; cursor:pointer; font-size: 10px; margin-top: 20px;">[Format Drive (Reset)]
