<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPU Overclock Clicker</title>
    <style>
        body {
            background-color: #050505;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .game-layout {
            display: flex;
            gap: 20px;
            max-width: 900px;
            width: 90%;
        }

        .main-game, .shop {
            background: #0f0f0f;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #00ffcc;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
        }

        .main-game { flex: 2; text-align: center; }
        .shop { flex: 1; min-width: 260px; }

        h1 { font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; }
        #score-display { font-size: 3.5rem; font-weight: bold; margin: 10px 0; color: #fff; text-shadow: 0 0 10px #00ffcc; }
        
        /* THE CHIP BUTTON */
        #click-button {
            background: none;
            border: none;
            width: 220px;
            height: 220px;
            cursor: pointer;
            transition: transform 0.05s;
            padding: 0;
            outline: none;
        }

        #click-button img {
            width: 100%;
            filter: drop-shadow(0 0 10px #00ffcc);
        }

        #click-button:active { transform: scale(0.92); }

        /* PULSE ANIMATION FOR AUTO-CLICK */
        .pulse { animation: pulse-red 0.2s infinite; }
        @keyframes pulse-red {
            0% { filter: drop-shadow(0 0 10px #00ffcc); }
            50% { filter: drop-shadow(0 0 20px #00ffcc); }
            100% { filter: drop-shadow(0 0 10px #00ffcc); }
        }

        .shop-item {
            background: #151515;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #333;
            cursor: pointer;
            transition: 0.2s;
