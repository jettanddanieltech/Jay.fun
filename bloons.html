<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BOONSHOOTER // OMNI-REVELATION</title>
    <style>
        :root { --bg: #000; --blue: #33BBFF; --green: #00FF41; --text: #fff; --panel: #0a0a0a; --danger: #ff4444; }
        body.light-theme { --bg: #f0f0f0; --blue: #0077ff; --green: #00aa00; --text: #000; --panel: #fff; }
        
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; transition: background 0.5s; }
        
        /* UI OVERLAYS */
        .menu-screen { position: absolute; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: 0.5s; }
        
        .logo { font-size: clamp(40px, 8vw, 90px); font-weight: 900; color: var(--blue); text-shadow: 0 0 30px rgba(51,187,255,0.6); transform: rotate(-2deg); margin-bottom: 10px; }
        .logo span { color: var(--green); }

        .btn { background: var(--panel); border: 2px solid var(--blue); color: var(--blue); padding: 12px 35px; border-radius: 12px; cursor: pointer; font-weight: bold; margin: 8px; transition: 0.3s; font-size: 14px; text-transform: uppercase; }
        .btn:hover { background: var(--blue); color: #000; box-shadow: 0 0 25px var(--blue); transform: scale(1.05); }

        #sidebar { position: absolute; right: 0; top: 0; width: 280px; height: 100%; background: var(--panel); border-left: 1px solid #222; padding: 20px; overflow-y: auto; z-index: 50; }
        .tower-card { background: #111; border: 1px solid #222; padding: 12px; margin-bottom: 12px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 15px; transition: 0.2s; }
        .tower-card:hover { border-color: var(--green); transform: translateX(-5px); }
        .tower-card small { color: var(--green); }

        #stats-hud { position: absolute; top: 20px; left: 20px; font-size: 18px; color: var(--green); background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 30px; border: 1px solid #222; z-index: 60; }
        canvas { display: block; filter: contrast(1.2); }
        
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-2px, 0, 0); } 20%, 80% { transform: translate3d(4px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-6px, 0, 0); } 40%, 60% { transform: translate3d(6px, 0, 0); } }
    </style>
</head>
<body id="game-body">

<div id="stats-hud">
    💰 $<span id="money">650</span> | ❤️ <span id="lives">100</span> | 📈 ROUND: <span id="round">1</span>
</div>

<div id="main-menu" class="menu-screen">
    <div class="logo">BOON<span>SHOOTER</span></div>
    <div style="color:var(--green); margin-bottom: 40px; font-size: 10px; letter-spacing: 4px;">OMNI_CORE V1.2 // PERSISTENT_MEMORY_ON</div>
    <button class="btn" onclick="startGame()">INITIATE MISSION</button>
    <button class="btn" onclick="openMenu('settings-menu')">SETTINGS</button>
    <button class="btn" onclick="openMenu('shop-menu')">BALLOON MARKET</button>
    <div id="high-score-display" style="margin-top:20px; font-size: 12px; opacity:0.6;">BEST ROUND: 0</div>
</div>

<div id="shop-menu" class="menu-screen" style="display:none;">
    <h2 style="color:var(--blue)">MARKETPLACE</h2>
    <button class="btn" onclick="buyPerk('Gold', 800)">GOLD BALLOONS (2X CASH)</button>
    <button class="btn" onclick="buyPerk('Swift', 1500)">SPEED UPGRADE (+10% RELOAD)</button>
    <button class="btn" onclick="openMenu('main-menu')">RETURN</button>
</div>

<div id="settings-menu" class="menu-screen" style="display:none;">
    <h2 style="color:var(--blue)">SYSTEM CONFIG</h2>
    <button class="btn" onclick="toggleTheme()">TOGGLE VISUAL THEME</button>
    <button class="btn" onclick="resetSave()" style="border-color:var(--danger); color:var(--danger)">ERASE MEMORY</button>
    <button class="btn" onclick="openMenu('main-menu')">RETURN</button>
</div>

<div id="sidebar" style="display:none;">
    <h4 style="color:var(--blue); text-align:center; margin-top:0;">DEFENSE UNITS</h4>
    <div id="tower-list"></div>
</div>

<canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let state = {
        money: 650, lives: 100, round: 1, active: false, multiplier: 1,
        towers: [], balloons: [], particles: [], bestRound: 0
    };

    const TOWER_DATA = [
        { name: "Recruit", cost: 200, color: "#33BBFF", type: "dart", range: 160 },
        { name: "Frost Knight", cost: 450, color: "#00FFFF", type: "ice", range: 130 },
        { name: "Acid Slime", cost: 600, color: "#39FF14", type: "slime", range: 110 },
        { name: "Sky Heli", cost: 1500, color: "#CCCCCC", type: "heli", range: 350 },
        { name: "Atomic Nuke", cost: 6000, color: "#FF3131", type: "nuke", range: 500 },
        { name: "Void Clock", cost: 9000, color: "#BC13FE", type: "time", range: 1000 }
    ];

    function openMenu(id) {
        document.querySelectorAll('.menu-screen').forEach(m => m.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
    }

    function startGame() {
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('sidebar').style.display = 'block';
        state.active = true;
        renderArmory();
        gameLoop();
    }

    function renderArmory() {
        const container = document.getElementById('tower-list');
        container.innerHTML = TOWER_DATA.map(t => `
            <div class="tower-card" onclick="selectedTowerType='${t.type}'">
                <div style="width:15px; height:15px; background:${t.color}; border-radius:50%"></div>
                <div><b>${t.name}</b><br><small>$${t.cost}</small></div>
            </div>
        `).join('');
    }

    let selectedTowerType = 'dart';

    canvas.addEventListener('click', (e) => {
        const type = TOWER_DATA.find(t => t.type === selectedTowerType);
        if(state.money >= type.cost) {
            state.towers.push({ x: e.clientX, y: e.clientY, ...type, lastShot: 0 });
            state.money -= type.cost;
            updateHUD();
        }
    });

    function updateHUD() {
        document.getElementById('money').innerText = Math.floor(state.money);
        document.getElementById('lives').innerText = state.lives;
        document.getElementById('round').innerText = state.round;
        if(state.round > state.bestRound) {
            state.bestRound = state.round;
            localStorage.setItem('boon_best', state.bestRound);
        }
    }

    function spawnBalloons() {
        if(Math.random() < 0.03 + (state.round * 0.005)) {
            state.balloons.push({ x: 0, y: canvas.height/2, hp: Math.ceil(state.round/2), speed: 2 + (state.round*0.1) });
        }
    }

    function createExplosion(x, y, color) {
        for(let i=0; i<8; i++) {
            state.particles.push({ x, y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 1, color });
        }
    }

    function gameLoop() {
        if(!state.active) return;
        ctx.fillStyle = "rgba(0,0,0,0.2)";
        ctx.fillRect(0,0,canvas.width, canvas.height);
        
        spawnBalloons();

        // Particles
        state.particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.life -= 0.02;
            if(p.life <= 0) state.particles.splice(i, 1);
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life;
            ctx.fillRect(p.x, p.y, 4, 4);
            ctx.globalAlpha = 1;
        });

        // Balloons
        state.balloons.forEach((b, i) => {
            b.x += b.speed;
            ctx.fillStyle = "#ff4444";
            ctx.beginPath();
            ctx.arc(b.x, b.y, 12, 0, Math.PI*2);
            ctx.fill();
            if(b.x > canvas.width) {
                state.lives -= 1;
                state.balloons.splice(i, 1);
                updateHUD();
            }
        });

        // Towers
        state.towers.forEach(t => {
            ctx.fillStyle = t.color;
            ctx.beginPath(); ctx.arc(t.x, t.y, 15, 0, Math.PI*2); ctx.fill();
            
            let now = Date.now();
            if(now - t.lastShot > 800) {
                state.balloons.forEach((b, bi) => {
                    let d = Math.hypot(t.x - b.x, t.y - b.y);
                    if(d < t.range) {
                        b.hp--;
                        if(t.type === 'nuke') {
                            document.getElementById('game-body').classList.add('shake');
                            setTimeout(() => document.getElementById('game-body').classList.remove('shake'), 400);
                        }
                        if(b.hp <= 0) {
                            createExplosion(b.x, b.y, t.color);
                            state.balloons.splice(bi, 1);
                            state.money += 25 * state.multiplier;
                            updateHUD();
                        }
                        t.lastShot = now;
                    }
                });
            }
        });

        if(state.lives <= 0) {
            alert("MISSION FAILED. FINAL ROUND: " + state.round);
            location.reload();
        }

        requestAnimationFrame(gameLoop);
    }

    window.onload = () => {
        state.bestRound = localStorage.getItem('boon_best') || 0;
        document.getElementById('high-score-display').innerText = "BEST ROUND: " + state.bestRound;
    };
</script>
</body>
</html>
