        #game-container { flex-grow: 1; position: relative; display: flex; justify-content: center; align-items: center; background: #000; }

        .tower-card h4 { margin: 0 0 5px 0; color: #00ffcc; }
        .tower-card p { margin: 0; font-size: 0.8rem; color: #888; }
        #wave-btn { background: #00ffcc; color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: auto; }
        #wave-btn:hover { background: #fff; }
    </style>
</head>
