<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PC_TYCOON // REAL_SIM</title>
    <style>
        :root { --grass: #348232; --road: #334155; --shop: #1e293b; --player: #38bdf8; }
        body { margin: 0; background: var(--grass); font-family: 'Segoe UI', sans-serif; overflow: hidden; color: white; }

        /* HUD */
        #hud { position: fixed; top: 20px; left: 20px; background: rgba(0,0,0,0.9); padding: 15px 25px; border-radius: 12px; z-index: 1000; border: 2px solid #444; }
        .money { color: #4ade80; font-weight: 900; font-size: 24px; text-shadow: 0 0 10px rgba(74,222,128,0.3); }

        /* WORLD MAP */
        #world { width: 100vw; height: 100vh; position: relative; background: radial-gradient(circle, #45a043 0%, #2d5a27 100%); }
        .road { position: absolute; top: 50%; left: 0; width: 100%; height: 120px; background: var(--road); transform: translateY(-50%); border-top: 5px solid #444; border-bottom: 5px solid #444; }

        .building { position: absolute; width: 320px; height: 260px; border: 8px solid #111; border-radius: 4px; box-shadow: 0 20px 0 #000; }
        #my-shop { left: 80px; top: 40px; background: #2d3748; }
        #tech-mart { right: 80px; top: 40px; background: #cbd5e1; color: #111; }

        /* ANIMATED CHARACTER */
        #player { 
            position: absolute; width: 48px; height: 64px; 
            top: 450px; left: 50%; transform: translate(-50%, -50%); 
            z-index: 500; transition: transform 0.1s;
        }
        .character-body { width: 100%; height: 100%; position: relative; }
        .head { width: 24px; height: 24px; background: #ffdbac; border-radius: 50%; position: absolute; top: 0; left: 12px; border: 2px solid #000; }
        .torso { width: 32px; height: 30px; background: var(--player); border-radius: 4px; position: absolute; top: 22px; left: 8px; border: 2px solid #000; }
        .leg { width: 10px; height: 14px; background: #1e293b; position: absolute; bottom: 0; border: 2px solid #000; }
        .leg.left { left: 8px; } .leg.right { right: 8px; }
        
        /* WALKING ANIMATION */
        .walking .leg.left { animation: walk 0.2s infinite alternate; }
        .walking .leg.right { animation: walk 0.2s infinite alternate-reverse; }
        @keyframes walk { from { transform: translateY(0); } to { transform: translateY(-5px); } }

        /* WIRING ZOOM */
        #wiring-ui { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.98); 
            display: none; align-items: center; justify-content: center; z-index: 2000; 
        }
        #case { width: 450px; height: 500px; background: #0a0a0f; border: 4px solid #334155; position: relative; box-shadow: 0 0 50px #000; }
        .port { position: absolute; width: 30px; height: 30px; background: #1a1a2e; border: 2px solid #444; cursor: pointer; border-radius: 4px; z-index: 100; }
        .port.connected { background: #00ff88; box-shadow: 0 0 20px #00ff88; border-color: white; }
        canvas { position: absolute; inset: 0; pointer-events: none; z-index: 50; }
    </style>
</head>
<body>

<div id="hud">
    <div class="money">$<span id="cash">750</span></div>
    <div id="status" style="font-size: 11px; color: #94a3b8; margin-top: 5px; text-transform: uppercase; font-weight: bold;">Mission: Go to Tech-Mart</div>
</div>

<div id="world">
    <div class="road"></div>
    <div id="my-shop" class="building"><div style="padding:20px; font-weight:900;">CUSTOM REPAIRS</div></div>
    <div id="tech-mart" class="building">
        <div style="padding:20px; font-weight:900; text-align:right;">WHOLESALE PARTS</div>
        <button onclick="buyBox()" style="position:absolute; bottom:20px; right:20px; padding:15px; background:#ef4444; color:white; border:none; font-weight:bold; cursor:pointer; border-radius:5px;">BUY PC BOX ($400)</button>
    </div>

    <div id="player">
        <div class="character-body">
            <div class="head"></div>
            <div class="torso"></div>
            <div class="leg left"></div>
            <div class="leg right"></div>
            <div id="handheld" style="display:none; position:absolute; top:10px; left:10px; font-size:24px;">📦</div>
        </div>
    </div>
</div>

<div id="wiring-ui">
    <div style="text-align:center;">
        <h2 style="color:var(--player); letter-spacing:5px;">WIRING STAGE</h2>
        <div id="case">
            <canvas id="wire-canvas" width="450" height="500"></canvas>
            <div id="p-psu" class="port" style="bottom: 40px; left: 40px;">PSU</div>
            <div id="p-mobo" class="port" style="top: 120px; right: 40px; height: 120px;">MOBO</div>
        </div>
        <button onclick="sellBuild()" style="margin-top: 30px; padding: 15px 50px; background: #00ff88; color: #000; border: none; font-weight: 900; cursor: pointer; border-radius: 5px;">COMPLETE & SELL PC</button>
    </div>
</div>

<script>
    let g = { x: window.innerWidth/2, y: 500, cash: 750, hasBox: false, conn: 0, activeP: null };
    const p = document.getElementById('player');
    const cvs = document.getElementById('wire-canvas');
    const ctx = cvs.getContext('2d');

    const keys = {};
    window.addEventListener('keydown', e => { keys[e.key] = true; p.classList.add('walking'); });
    window.addEventListener('keyup', e => { keys[e.key] = false; p.classList.remove('walking'); });

    function update() {
        if (keys['ArrowUp'] || keys['w']) g.y -= 6;
        if (keys['ArrowDown'] || keys['s']) g.y += 6;
        if (keys['ArrowLeft'] || keys['a']) { g.x -= 6; p.style.transform = 'translate(-50%, -50%) scaleX(-1)'; }
        if (keys['ArrowRight'] || keys['d']) { g.x += 6; p.style.transform = 'translate(-50%, -50%) scaleX(1)'; }

        p.style.top = g.y + 'px';
        p.style.left = g.x + 'px';

        // Check Building Entry
        if(g.y < 300) {
            if(g.x < 400 && g.hasBox) { document.getElementById('wiring-ui').style.display = 'flex'; }
        }
        requestAnimationFrame(update);
    }
    update();

    function buyBox() {
        if(g.cash >= 400 && !g.hasBox) {
            g.cash -= 400;
            g.hasBox = true;
            document.getElementById('cash').innerText = g.cash;
            document.getElementById('handheld').style.display = 'block';
            document.getElementById('status').innerText = "Mission: Enter Workshop";
        }
    }

    document.querySelectorAll('.port').forEach(port => {
        port.onclick = () => {
            if (port.id === 'p-psu') { g.activeP = port; port.style.borderColor = 'cyan'; } 
            else if (g.activeP) { connect(g.activeP, port); g.activeP = null; }
        };
    });

    function connect(s, e) {
        if (e.classList.contains('connected')) return;
        e.classList.add('connected');
        g.conn++;
        
        ctx.strokeStyle = '#00ff88'; ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.moveTo(55, 455);
        ctx.bezierCurveTo(55, 200, 400, 400, 410, 180);
        ctx.stroke();
    }

    function sellBuild() {
        if(g.conn > 0) {
            g.cash += 1200;
            g.hasBox = false; g.conn = 0;
            ctx.clearRect(0,0,450,500);
            document.getElementById('cash').innerText = g.cash;
            document.getElementById('wiring-ui').style.display = 'none';
            document.getElementById('handheld').style.display = 'none';
            document.getElementById('status').innerText = "Mission: Buy more parts";
            g.y = 350; // Exit shop
            document.querySelectorAll('.port').forEach(pt => pt.classList.remove('connected'));
        }
    }
</script>
</body>
</html>
