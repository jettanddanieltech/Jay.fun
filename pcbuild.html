<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PC_TYCOON // REPLICA</title>
    <style>
        :root { --wall: #e2e8f0; --floor: #94a3b8; --accent: #3b82f6; --neon: #00f2ff; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #000; overflow: hidden; color: white; }

        /* VIEWPORT (THE ROOM) */
        #game-container { width: 100vw; height: 100vh; position: relative; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #1e293b 0%, #020617 100%); }

        /* PHYSICAL STATIONS (REPLICA OF TYCOON TILES) */
        .station { position: absolute; border: 4px solid rgba(255,255,255,0.1); border-radius: 10px; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 40px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); width: 80%; height: 70%; }
        .active-station { display: flex; }

        /* NAVIGATION BUTTONS (WALKING AROUND THE SHOP) */
        .nav-controls { position: absolute; bottom: 30px; display: flex; gap: 20px; z-index: 1000; }
        .walk-btn { background: #fff; color: #000; border: none; padding: 15px 25px; font-weight: 900; cursor: pointer; border-radius: 5px; text-transform: uppercase; font-size: 12px; }
        .walk-btn:hover { background: var(--accent); color: white; }

        /* STATION 1: PARTS SHELF */
        .shelf-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 100%; }
        .part-item { background: #1e293b; border: 2px solid #334155; padding: 20px; text-align: center; border-radius: 8px; }

        /* STATION 2: WORKBENCH (THE WIRE PART) */
        #workbench-ui { position: relative; width: 600px; height: 450px; background: #000; border: 2px solid #334155; }
        .port { position: absolute; width: 22px; height: 22px; background: #111; border: 2px solid #444; cursor: pointer; z-index: 100; border-radius: 3px; }
        .port:hover { border-color: var(--neon); box-shadow: 0 0 10px var(--neon); }
        .connected { background: var(--neon) !important; box-shadow: 0 0 20px var(--neon); border-color: white !important; }
        canvas { position: absolute; inset: 0; pointer-events: none; z-index: 50; }

        /* HUD */
        #hud { position: absolute; top: 0; width: 100%; padding: 25px; display: flex; justify-content: space-between; box-sizing: border-box; }
        .money-tag { font-size: 24px; font-weight: 900; color: #4ade80; text-shadow: 0 0 10px rgba(74, 222, 128, 0.3); }
        .inv-tag { font-size: 12px; color: #64748b; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud">
        <div class="money-tag">💰 $<span id="cash">500</span></div>
        <div class="inv-tag">STORAGE: <span id="storage-list">Empty</span></div>
    </div>

    <section id="station-shelf" class="station active-station">
        <h1 style="margin-bottom: 30px; letter-spacing: 5px;">COMPONENTS_SHELF</h1>
        <div class="shelf-grid">
            <div class="part-item"><h4>i5 CPU</h4><p>$150</p><button class="walk-btn" onclick="buy('cpu', 150)">Take Part</button></div>
            <div class="part-item"><h4>B550 Mobo</h4><p>$200</p><button class="walk-btn" onclick="buy('mobo', 200)">Take Part</button></div>
            <div class="part-item"><h4>Cables</h4><p>$40</p><button class="walk-btn" onclick="buy('wires', 40)">Take Part</button></div>
        </div>
    </section>

    <section id="station-build" class="station">
        <h1 style="margin-bottom: 20px;">WORKBENCH_V1</h1>
        <div id="workbench-ui">
            <canvas id="wire-canvas" width="600" height="450"></canvas>
            <div id="p-psu" class="port" style="bottom: 30px; left: 30px;"></div>
            <div id="p-mb" class="port" style="top: 150px; right: 30px; height: 100px;"></div>
            <div id="p-cpu" class="port" style="top: 30px; left: 150px; width: 40px; height: 40px;"></div>
        </div>
        <p style="font-size: 11px; color: #444; margin-top: 10px;">Click PSU then click a component to route wires.</p>
    </section>

    <section id="station-sell" class="station">
        <h1 style="color: var(--neon);">SELL_STATION</h1>
        <p id="sell-status">PC NOT READY. COMPLETE WIRING FIRST.</p>
        <button id="sell-btn" class="walk-btn" style="display:none; background: var(--neon);" onclick="sellPC()">SELL FOR $1,200</button>
    </section>

    <div class="nav-controls">
        <button class="walk-btn" onclick="walkTo('station-shelf')">⬅ Walk to Shelf</button>
        <button class="walk-btn" onclick="walkTo('station-build')">⬆ Walk to Workbench</button>
        <button class="walk-btn" onclick="walkTo('station-sell')">➡ Walk to Counter</button>
    </div>
</div>

<script>
    let player = { cash: 500, inv: [], connections: 0, activePort: null };
    const canvas = document.getElementById('wire-canvas');
    const ctx = canvas.getContext('2d');

    function walkTo(id) {
        document.querySelectorAll('.station').forEach(s => s.classList.remove('active-station'));
        document.getElementById(id).classList.add('active-station');
    }

    function buy(item, cost) {
        if(player.cash >= cost && !player.inv.includes(item)) {
            player.cash -= cost;
            player.inv.push(item);
            updateHUD();
        } else if(player.inv.includes(item)) {
            alert("Already in inventory!");
        } else {
            alert("Not enough cash! Sell a PC first.");
        }
    }

    function updateHUD() {
        document.getElementById('cash').innerText = player.cash;
        document.getElementById('storage-list').innerText = player.inv.join(', ').toUpperCase() || 'Empty';
    }

    document.querySelectorAll('.port').forEach(p => {
        p.onclick = () => {
            if(!player.inv.includes('wires')) return alert("Pick up 'Cables' from the shelf first!");
            if(!player.inv.includes('mobo')) return alert("Place a 'Mobo' from the shelf first!");

            if(p.id === 'p-psu') {
                player.activePort = p;
                p.style.borderColor = 'var(--neon)';
            } else if(player.activePort) {
                drawWire(player.activePort, p);
                player.activePort = null;
            }
        };
    });

    function drawWire(s, e) {
        if(e.classList.contains('connected')) return;
        e.classList.add('connected');
        player.connections++;

        const sX = s.offsetLeft + s.offsetWidth/2;
        const sY = s.offsetTop + s.offsetHeight/2;
        const eX = e.offsetLeft + e.offsetWidth/2;
        const eY = e.offsetTop + e.offsetHeight/2;

        ctx.strokeStyle = '#222'; ctx.lineWidth = 5;
        ctx.beginPath(); ctx.moveTo(sX, sY);
        ctx.bezierCurveTo(sX, eY+80, eX, eY+80, eX, eY); ctx.stroke();

        if(player.connections >= 2) {
            document.getElementById('sell-btn').style.display = 'block';
            document.getElementById('sell-status').innerText = "PC IS FUNCTIONAL. READY TO PROFIT.";
        }
    }

    function sellPC() {
        player.cash += 1200;
        player.inv = [];
        player.connections = 0;
        ctx.clearRect(0,0,canvas.width,canvas.height);
        document.querySelectorAll('.port').forEach(p => p.classList.remove('connected'));
        document.getElementById('sell-btn').style.display = 'none';
        document.getElementById('sell-status').innerText = "PC SOLD. ORDER NEW PARTS.";
        updateHUD();
        walkTo('station-shelf');
    }
</script>
</body>
</html>
