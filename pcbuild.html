<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PC_TYCOON // THE_WORKSHOP</title>
    <style>
        :root { --grass: #348232; --road: #334155; --floor: #1e293b; --player: #38bdf8; --money: #4ade80; }
        body { margin: 0; background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; color: white; }

        /* CAMERA SYSTEM */
        #viewport { width: 100vw; height: 100vh; position: relative; overflow: hidden; transition: 0.5s ease-in-out; }

        /* WORLD MAP (OUTSIDE) */
        #outside { width: 100vw; height: 100vh; background: var(--grass); position: absolute; }
        .road { position: absolute; top: 50%; width: 100%; height: 100px; background: var(--road); transform: translateY(-50%); }
        
        /* BUILDINGS */
        .building-ext { position: absolute; width: 250px; height: 200px; border: 6px solid #111; display: flex; align-items: center; justify-content: center; font-weight: 900; }
        #shop-ext { left: 100px; top: 50px; background: #2d3748; border-color: var(--player); }
        #mart-ext { right: 100px; top: 50px; background: #cbd5e1; color: #111; }

        /* THE WORKSHOP (INTERIOR) */
        #interior { 
            width: 100vw; height: 100vh; background: #111; 
            position: absolute; top: 100%; transition: 0.5s; 
            display: flex; align-items: center; justify-content: center;
        }
        .inside-room { 
            width: 80%; height: 80%; background: var(--floor); border: 10px solid #334155; 
            position: relative; background-image: radial-gradient(#2d3748 1px, transparent 1px); background-size: 40px 40px;
        }
        .table { width: 150px; height: 100px; background: #475569; border: 4px solid #000; position: absolute; top: 50px; left: 50px; }

        /* THE PLAYER */
        #player { 
            position: absolute; width: 44px; height: 60px; 
            top: 500px; left: 50%; transform: translate(-50%, -50%); 
            z-index: 1000;
        }
        .char { width: 30px; height: 40px; background: var(--player); border: 3px solid #000; margin: 20px auto 0; border-radius: 4px; position: relative; }
        .head { width: 24px; height: 24px; background: #ffdbac; border: 3px solid #000; position: absolute; top: -18px; left: 0; border-radius: 4px; }
        .item-box { display: none; position: absolute; top: -30px; left: 5px; font-size: 20px; }

        /* WIRING UI */
        #wire-gui { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 5000; }
        #pc-case { width: 400px; height: 450px; background: #000; border: 2px solid #333; position: relative; }
        .port { position: absolute; width: 25px; height: 25px; background: #111; border: 1px solid #444; }
        .connected { background: var(--money) !important; box-shadow: 0 0 15px var(--money); }

        /* HUD */
        #hud { position: fixed; top: 20px; left: 20px; background: #000; padding: 10px 20px; border: 2px solid #333; z-index: 9000; }
    </style>
</head>
<body>

<div id="hud">CASH: <span style="color:var(--money)">$<span id="cash">1000</span></span></div>

<div id="viewport">
    <div id="outside">
        <div class="road"></div>
        <div id="shop-ext" class="building-ext">MY WORKSHOP<br><small>(WALK IN)</small></div>
        <div id="mart-ext" class="building-ext">TECH-MART<br><button onclick="buyPart()">BUY $400</button></div>
    </div>

    <div id="interior">
        <div class="inside-room">
            <div class="table" id="build-trigger">BUILD TABLE</div>
            <div style="position:absolute; bottom:20px; left:50%; transform:translateX(-50%); color:#666;">WALK DOWN TO EXIT</div>
        </div>
    </div>

    <div id="player">
        <div class="char"><div class="head"></div><div id="box" class="item-box">📦</div></div>
    </div>
</div>

<div id="wire-gui">
    <h2>WIRING PC...</h2>
    <div id="pc-case">
        <canvas id="c" width="400" height="450" style="position:absolute;"></canvas>
        <div id="p-psu" class="port" style="bottom:20px; left:20px;"></div>
        <div id="p-mb" class="port" style="top:100px; right:20px; height:100px;"></div>
    </div>
    <button onclick="finishBuild()" style="margin-top:20px; padding:10px 40px; background:var(--money); border:none; font-weight:bold; cursor:pointer;">SELL PC ($1200)</button>
</div>

<script>
    let g = { x: window.innerWidth/2, y: 450, cash: 1000, hasBox: false, mode: 'outside', connections: 0, activeP: null };
    const p = document.getElementById('player');
    const view = document.getElementById('interior');
    const cvs = document.getElementById('c');
    const ctx = cvs.getContext('2d');

    const keys = {};
    window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

    function loop() {
        const s = 6;
        if(keys['w'] || keys['arrowup']) g.y -= s;
        if(keys['s'] || keys['arrowdown']) g.y += s;
        if(keys['a'] || keys['arrowleft']) g.x -= s;
        if(keys['d'] || keys['arrowright']) g.x += s;

        p.style.left = g.x + 'px';
        p.style.top = g.y + 'px';

        checkLogic();
        requestAnimationFrame(loop);
    }
    loop();

    function buyPart() {
        if(g.cash >= 400 && !g.hasBox) {
            g.cash -= 400; g.hasBox = true;
            document.getElementById('cash').innerText = g.cash;
            document.getElementById('box').style.display = 'block';
        }
    }

    function checkLogic() {
        // ENTER SHOP
        if(g.mode === 'outside' && g.x < 350 && g.y < 250) {
            g.mode = 'inside';
            view.style.top = '0';
            g.y = 500; // Reset pos to bottom of room
        }
        // EXIT SHOP
        if(g.mode === 'inside' && g.y > 550) {
            g.mode = 'outside';
            view.style.top = '100%';
            g.y = 350;
        }
        // TRIGGER BUILD
        if(g.mode === 'inside' && g.x < 250 && g.y < 200 && g.hasBox) {
            document.getElementById('wire-gui').style.display = 'flex';
        }
    }

    // WIRING
    document.querySelectorAll('.port').forEach(pt => {
        pt.onclick = () => {
            if(pt.id === 'p-psu') g.activeP = pt;
            else if(g.activeP) {
                pt.classList.add('connected'); g.connections++;
                ctx.strokeStyle = '#4ade80'; ctx.lineWidth = 6;
                ctx.beginPath(); ctx.moveTo(32, 412); ctx.lineTo(378, 150); ctx.stroke();
            }
        };
    });

    function finishBuild() {
        if(g.connections > 0) {
            g.cash += 1200; g.hasBox = false; g.connections = 0;
            document.getElementById('cash').innerText = g.cash;
            document.getElementById('wire-gui').style.display = 'none';
            document.getElementById('box').style.display = 'none';
            ctx.clearRect(0,0,400,450);
            document.querySelectorAll('.port').forEach(pt => pt.classList.remove('connected'));
        }
    }
</script>
</body>
</html>
